agent:
  name: Helios
  mode: react
  max_iterations: 10
  early_stopping: true
  temperature: 0.8

llm:
    base_url: ${OLLAMA_BASE_URL}
    model: ${OLLAMA_MODEL}
    temperature: 0.8          # 此处 temperature 是 LLM 调用时的参数，可覆盖 agent 层级的参数

embedding: 
    model: ${EMBEDDING_MODEL}
    base_url: ${OLLAMA_BASE_URL}  

memory:
    short_term:
      window_size: 10         # 保留轮数
      summary_enabled: true   # 窗口满后是否自动摘要
    long_term:
      collection_name: helios_memory
      persist_directory: data/long_term_memory
      retrieval_top_k: 3

tools:
    enabled:
      - calculator
      - datetime
      - file_read
      - file_write
      - file_search

logging:
    level: INFO
